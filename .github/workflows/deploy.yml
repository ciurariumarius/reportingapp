name: Deploy to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e
            SITE_PATH="/home/${{ secrets.SERVER_USER }}/htdocs/raport.digitaldot.ro"
            
            cd "$SITE_PATH"
            
            echo "--- PULLING LATEST CODE ---"
            git fetch origin main
            git reset --hard origin/main
            
            echo "--- INSTALLING DEPENDENCIES ---"
            npm ci || npm install --legacy-peer-deps

            echo "--- PREPARING DATABASE ---"
            npx prisma generate
            npx prisma migrate deploy
            
            echo "--- BUILDING APPLICATION ---"
            export NODE_OPTIONS="--max-old-space-size=2048"
            npm run build
            
            echo "--- LOADING ENVIRONMENT ---"
            export NVM_DIR="/home/${{ secrets.SERVER_USER }}/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            echo "--- RESTARTING PM2 PROCESS ---"
            npx pm2 delete raport-digitaldot || true
            npx pm2 start npx --name "raport-digitaldot" -- next start -p 3006
            
            npx pm2 save || true
            echo "--- DEPLOYMENT COMPLETED SUCCESSFULLY ---"
